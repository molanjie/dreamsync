<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamSync - 梦境联网平台</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 动态星空背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: var(--opacity); transform: scale(1); }
        }

        /* 流星效果 */
        .meteor {
            position: absolute;
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
            animation: meteor 3s ease-in-out infinite;
            opacity: 0;
        }

        @keyframes meteor {
            0% { transform: translateX(-100px) translateY(0); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateX(calc(100vw + 100px)) translateY(300px); opacity: 0; }
        }

        /* 渐变动画 */
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 玻璃态卡片 */
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(99, 102, 241, 0.5);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.2);
        }

        /* 输入框样式 */
        .input-field {
            background: rgba(30, 41, 59, 0.5);
            border: 2px solid rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1), 0 0 20px rgba(99, 102, 241, 0.2);
            background: rgba(30, 41, 59, 0.8);
        }

        /* 按钮悬停效果 */
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        /* 标签页切换动画 */
        .tab-btn {
            position: relative;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #6366f1;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border-radius: 3px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { width: 0; left: 50%; }
            to { width: 100%; left: 0; }
        }

        /* 微信登录按钮 */
        .wechat-btn {
            background: linear-gradient(135deg, #07c160, #05a350);
            position: relative;
            overflow: hidden;
        }

        .wechat-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(7, 193, 96, 0.4);
        }

        /* Toast 通知 */
        .toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        .toast.error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
        }

        /* 加载动画 */
        .skeleton {
            background: linear-gradient(90deg, rgba(30, 41, 59, 0.5) 25%, rgba(51, 65, 85, 0.5) 50%, rgba(30, 41, 59, 0.5) 75%);
            background-size: 200% 100%;
            animation: skeleton 1.5s ease-in-out infinite;
        }

        @keyframes skeleton {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 庆祝动画 - 星星飞散 */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 9999;
            animation: confetti-fall 3s ease-out forwards;
        }

        @keyframes confetti-fall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg) scale(0);
            }
        }

        /* 抖动动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.3s ease;
        }

        /* 淡入动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeInUp {
            animation: fadeInUp 0.5s ease forwards;
        }

        /* 密码强度指示器 */
        .strength-bar {
            height: 4px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        /* 浮动提示 */
        .floating-label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            pointer-events: none;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .input-wrapper:focus-within .floating-label,
        .input-wrapper.has-value .floating-label {
            top: 0;
            transform: translateY(-50%);
            font-size: 12px;
            background: #0f172a;
            padding: 0 8px;
            color: #6366f1;
        }

        /* 脉冲环 */
        .pulse-ring {
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        /* 统计数字动画 */
        .stat-number {
            display: inline-block;
            animation: countUp 1s ease forwards;
        }

        @keyframes countUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 页面切换动画 */
        .page-transition-enter {
            opacity: 0;
            transform: translateX(20px);
        }

        .page-transition-enter-active {
            opacity: 1;
            transform: translateX(0);
            transition: all 0.3s ease;
        }

        .page-transition-exit {
            opacity: 1;
        }

        .page-transition-exit-active {
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.3s ease;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
        }
    </style>
</head>
<body class="text-white">
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>

    <!-- 主内容 -->
    <div class="relative min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md relative z-10">
            <!-- Logo -->
            <div class="text-center mb-8 animate-fadeInUp" style="animation-delay: 0.1s">
                <div class="w-24 h-24 mx-auto rounded-3xl bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center text-5xl mb-4 shadow-2xl pulse-ring">
                    🌙
                </div>
                <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400">
                    DreamSync
                </h1>
                <p class="text-slate-400 mt-2">在梦境中相遇</p>
                <p class="text-xs text-slate-500 mt-1">已有 <span class="text-indigo-400 font-semibold">12,847</span> 名梦境探索者</p>
            </div>

            <!-- 登录卡片 -->
            <div class="glass-card rounded-3xl overflow-hidden shadow-2xl animate-fadeInUp" style="animation-delay: 0.2s">
                <!-- 标签切换 -->
                <div class="flex border-b border-slate-700/50">
                    <button onclick="switchTab('login')" class="tab-btn flex-1 py-4 text-center font-medium text-slate-400 active" data-tab="login">
                        登录
                    </button>
                    <button onclick="switchTab('register')" class="tab-btn flex-1 py-4 text-center font-medium text-slate-400" data-tab="register">
                        注册
                    </button>
                    <button onclick="switchTab('wechat')" class="tab-btn flex-1 py-4 text-center font-medium text-slate-400" data-tab="wechat">
                        微信
                    </button>
                </div>

                <!-- 登录表单 -->
                <div id="login-tab" class="p-6 tab-content">
                    <form onsubmit="handleLogin(event)">
                        <div class="space-y-4">
                            <div class="input-wrapper relative">
                                <input type="email" id="login-email" 
                                    class="input-field w-full px-4 py-4 rounded-xl text-white peer" placeholder=" ">
                                <label class="floating-label">邮箱</label>
                            </div>
                            <div class="input-wrapper relative">
                                <input type="password" id="login-password" 
                                    class="input-field w-full px-4 py-4 rounded-xl text-white peer" placeholder=" ">
                                <label class="floating-label">密码</label>
                            </div>
                            
                            <div class="flex items-center justify-between text-sm">
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="checkbox" id="remember-me" class="w-4 h-4 rounded border-slate-600 text-indigo-500 focus:ring-indigo-500">
                                    <span class="text-slate-400">记住我</span>
                                </label>
                                <a href="#" class="text-indigo-400 hover:text-indigo-300 transition">忘记密码？</a>
                            </div>

                            <button type="submit" class="btn-primary w-full py-4 rounded-xl font-semibold text-white">
                                登录
                            </button>
                        </div>
                    </form>
                    
                    <div class="mt-6 text-center">
                        <p class="text-slate-400 text-sm mb-4">或使用以下方式登录</p>
                        <button onclick="switchTab('wechat')" 
                            class="wechat-btn w-full py-3 rounded-xl font-semibold text-white flex items-center justify-center space-x-2">
                            <span class="text-xl">💬</span>
                            <span>微信登录</span>
                        </button>
                    </div>
                </div>

                <!-- 注册表单 -->
                <div id="register-tab" class="p-6 tab-content hidden">
                    <form onsubmit="handleRegister(event)">
                        <div class="space-y-4">
                            <div class="input-wrapper relative">
                                <input type="text" id="register-username" 
                                    class="input-field w-full px-4 py-4 rounded-xl text-white" placeholder=" ">
                                <label class="floating-label">用户名</label>
                            </div>
                            <div class="input-wrapper relative">
                                <input type="email" id="register-email" 
                                    class="input-field w-full px-4 py-4 rounded-xl text-white" placeholder=" ">
                                <label class="floating-label">邮箱</label>
                            </div>
                            <div class="input-wrapper relative">
                                <input type="password" id="register-password" 
                                    class="input-field w-full px-4 py-4 rounded-xl text-white" 
                                    oninput="checkPasswordStrength(this.value)" placeholder=" ">
                                <label class="floating-label">密码（至少6位）</label>
                            </div>
                            
                            <!-- 密码强度指示器 -->
                            <div class="space-y-2">
                                <div class="flex space-x-1">
                                    <div id="strength-1" class="strength-bar flex-1 bg-slate-700"></div>
                                    <div id="strength-2" class="strength-bar flex-1 bg-slate-700"></div>
                                    <div id="strength-3" class="strength-bar flex-1 bg-slate-700"></div>
                                    <div id="strength-4" class="strength-bar flex-1 bg-slate-700"></div>
                                </div>
                                <p id="strength-text" class="text-xs text-slate-500 text-center"></p>
                            </div>

                            <button type="submit" class="btn-primary w-full py-4 rounded-xl font-semibold text-white">
                                创建账号
                            </button>
                        </div>
                    </form>
                </div>

                <!-- 微信登录 -->
                <div id="wechat-tab" class="p-6 tab-content hidden">
                    <div class="text-center">
                        <h3 class="text-xl font-semibold mb-2">微信登录</h3>
                        <p class="text-sm text-slate-400 mb-6">扫描二维码快速登录</p>
                        
                        <!-- 二维码区域 -->
                        <div id="qrcode-container" class="mb-4">
                            <div id="qrcode-loading" class="w-48 h-48 mx-auto bg-slate-800/50 rounded-2xl flex items-center justify-center">
                                <div class="text-center">
                                    <div class="w-8 h-8 border-2 border-indigo-400 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
                                    <p class="text-sm text-slate-400">生成二维码...</p>
                                </div>
                            </div>
                            <canvas id="qrcode-canvas" class="hidden mx-auto rounded-2xl"></canvas>
                        </div>

                        <!-- 登录状态 -->
                        <div id="wechat-status" class="hidden mb-4 p-4 rounded-xl bg-slate-800/50">
                            <div class="flex items-center justify-center space-x-2">
                                <div class="w-3 h-3 rounded-full bg-emerald-400 animate-pulse"></div>
                                <span class="text-sm text-slate-300" id="status-text">等待扫码...</span>
                            </div>
                        </div>

                        <!-- 模拟登录按钮（开发模式） -->
                        <button onclick="simulateScan()" id="simulate-btn"
                            class="wechat-btn w-full py-4 rounded-xl font-semibold text-white flex items-center justify-center space-x-3">
                            <span class="text-2xl">💬</span>
                            <span class="text-lg">模拟扫码登录</span>
                        </button>

                        <div class="mt-4 p-3 bg-slate-800/30 rounded-xl">
                            <p class="text-xs text-slate-500" id="wechat-mode-text">
                                ⚠️ 开发模式：点击按钮模拟扫码<br>
                                生产环境需配置微信开放平台
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 返回首页 -->
            <div class="text-center mt-6 animate-fadeInUp" style="animation-delay: 0.3s">
                <a href="index.html" class="text-slate-400 hover:text-indigo-400 transition text-sm inline-flex items-center space-x-1">
                    <span>←</span>
                    <span>返回首页</span>
                </a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // 生成星空背景
        function generateStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (2 + Math.random() * 3) + 's');
                star.style.setProperty('--opacity', (0.3 + Math.random() * 0.7));
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }

            // 添加流星
            for (let i = 0; i < 3; i++) {
                const meteor = document.createElement('div');
                meteor.className = 'meteor';
                meteor.style.top = Math.random() * 50 + '%';
                meteor.style.left = '0';
                meteor.style.animationDelay = (i * 4 + Math.random() * 2) + 's';
                container.appendChild(meteor);
            }
        }

        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });

            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            document.getElementById(tab + '-tab').classList.remove('hidden');
            
            // 切换到微信标签时，自动初始化登录
            if (tab === 'wechat') {
                simulateWeChatLogin();
            }
        }

        // 密码强度检测
        function checkPasswordStrength(password) {
            const bars = [
                document.getElementById('strength-1'),
                document.getElementById('strength-2'),
                document.getElementById('strength-3'),
                document.getElementById('strength-4')
            ];
            const text = document.getElementById('strength-text');

            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            const level = Math.min(strength, 4);
            const colors = ['#ef4444', '#f59e0b', '#10b981', '#6366f1'];
            const labels = ['', '弱', '中等', '强', '非常强'];

            bars.forEach((bar, i) => {
                bar.style.background = i < level ? colors[level - 1] : '#334155';
            });

            text.textContent = level > 0 ? `密码强度：${labels[level]}` : '';
            text.style.color = level > 0 ? colors[level - 1] : '#64748b';
        }

        // 模拟微信登录
        async function simulateWeChatLogin() {
            showToast('正在获取微信授权...', 'success');
            
            try {
                // 1. 获取二维码
                const qrRes = await fetch('/api/wechat/qrcode');
                const qrData = await qrRes.json();
                
                if (!qrData.success) {
                    throw new Error('获取二维码失败');
                }

                const sessionId = qrData.sessionId;
                
                // 2. 显示二维码或模拟按钮
                if (qrData.simulated) {
                    // 模拟模式：显示模拟按钮
                    document.getElementById('simulate-btn').classList.remove('hidden');
                    document.getElementById('qrcode-loading').innerHTML = `
                        <div class="text-center p-4">
                            <p class="text-4xl mb-3">💬</p>
                            <p class="text-sm text-slate-300">开发模式</p>
                            <p class="text-xs text-slate-400 mt-1">点击下方按钮模拟登录</p>
                        </div>
                    `;
                } else {
                    // 真实模式：显示二维码
                    document.getElementById('qrcode-loading').classList.add('hidden');
                    // 这里可以用 QRCode.js 库生成二维码图片
                    // 目前简化为显示链接
                    document.getElementById('qrcode-loading').innerHTML = `
                        <div class="text-center p-4">
                            <p class="text-sm text-slate-300 mb-2">请使用微信扫描二维码</p>
                            <p class="text-xs text-slate-400 break-all">${qrData.qrUrl}</p>
                        </div>
                    `;
                    document.getElementById('wechat-status').classList.remove('hidden');
                }

                // 3. 开始轮询状态
                startPolling(sessionId);
                
            } catch (error) {
                console.error('微信登录失败:', error);
                showToast('❌ 获取二维码失败', 'error');
            }
        }

        // 模拟扫码
        async function simulateScan() {
            const statusEl = document.getElementById('wechat-status');
            const statusText = document.getElementById('status-text');
            statusEl.classList.remove('hidden');
            statusText.textContent = '正在确认登录...';

            // 获取最近的 sessionId
            try {
                const qrRes = await fetch('/api/wechat/qrcode');
                const qrData = await qrRes.json();
                
                if (qrData.sessionId) {
                    const res = await fetch('/api/wechat/simulate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sessionId: qrData.sessionId, nickname: '微信用户' })
                    });
                    const data = await res.json();
                    
                    if (data.success) {
                        statusText.textContent = '✅ 登录成功！';
                        showToast('✅ 微信登录成功！', 'success');
                        
                        // 保存 token
                        localStorage.setItem('dreamsync-token', data.token);
                        localStorage.setItem('dreamsync-user', JSON.stringify(data.user));
                        
                        triggerConfetti();
                        setTimeout(() => {
                            window.location.href = 'app.html';
                        }, 1000);
                    } else {
                        statusText.textContent = '❌ 登录失败';
                        showToast('❌ ' + (data.error || '登录失败'), 'error');
                    }
                }
            } catch (error) {
                console.error('模拟登录失败:', error);
                showToast('❌ 模拟登录失败', 'error');
            }
        }

        // 轮询登录状态
        let pollingTimer = null;
        function startPolling(sessionId) {
            if (pollingTimer) clearInterval(pollingTimer);
            
            const statusEl = document.getElementById('wechat-status');
            const statusText = document.getElementById('status-text');
            statusEl.classList.remove('hidden');

            let dots = 0;
            pollingTimer = setInterval(async () => {
                try {
                    const res = await fetch(`/api/wechat/status/${sessionId}`);
                    const data = await res.json();
                    
                    dots = (dots + 1) % 4;
                    const dotsStr = '.'.repeat(dots);
                    
                    switch (data.status) {
                        case 'pending':
                            statusText.textContent = `等待扫码${dotsStr}`;
                            break;
                        case 'scanned':
                            statusText.textContent = `已扫码，等待确认${dotsStr}`;
                            break;
                        case 'confirmed':
                            clearInterval(pollingTimer);
                            statusText.textContent = '✅ 登录成功！';
                            showToast('✅ 微信登录成功！', 'success');
                            
                            // 保存用户信息
                            if (data.token) {
                                localStorage.setItem('dreamsync-token', data.token);
                            }
                            if (data.user) {
                                localStorage.setItem('dreamsync-user', JSON.stringify(data.user));
                            }
                            
                            triggerConfetti();
                            setTimeout(() => {
                                window.location.href = 'app.html';
                            }, 1000);
                            break;
                        case 'expired':
                            clearInterval(pollingTimer);
                            statusText.textContent = '⏰ 二维码已过期';
                            showToast('二维码已过期，请刷新', 'error');
                            break;
                    }
                } catch (error) {
                    console.error('轮询失败:', error);
                }
            }, 2000);
        }

        // 页面加载时初始化微信登录
        document.addEventListener('DOMContentLoaded', () => {
            // 当切换到微信标签时，自动获取二维码
            window.initWeChatLogin = simulateWeChatLogin;
        });

        // 处理登录
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showToast('请填写邮箱和密码', 'error');
                e.target.classList.add('shake');
                setTimeout(() => e.target.classList.remove('shake'), 300);
                return;
            }

            const result = window.auth.login(email, password);
            
            if (result.success) {
                showToast('✅ ' + result.message, 'success');
                setTimeout(() => {
                    window.location.href = 'app.html';
                }, 1000);
            } else {
                showToast('❌ ' + result.message, 'error');
            }
        }

        // 处理注册
        function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('register-username').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;

            const result = window.auth.register(username, email, password);

            if (result.success) {
                showToast('✅ 注册成功！', 'success');
                triggerConfetti();
                
                const loginResult = window.auth.login(email, password);
                if (loginResult.success) {
                    setTimeout(() => {
                        window.location.href = 'app.html';
                    }, 1000);
                }
            } else {
                showToast('❌ ' + result.message, 'error');
            }
        }

        // Toast 通知
        function showToast(message, type = 'success') {
            let toast = document.querySelector('.toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.className = 'toast';
                document.body.appendChild(toast);
            }

            toast.textContent = message;
            toast.className = `toast ${type} show`;

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 庆祝动画
        function triggerConfetti() {
            const colors = ['#6366f1', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10px';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 3000);
            }
        }

        // 初始化
        generateStars();

        // 检查是否已登录
        if (window.auth && window.auth.isLoggedIn()) {
            window.location.href = 'app.html';
        }

        // 输入框浮动标签
        document.querySelectorAll('.input-field').forEach(input => {
            input.addEventListener('input', function() {
                this.parentElement.classList.toggle('has-value', this.value.length > 0);
            });
        });
    </script>
</body>
</html>
