<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamSync - 页面未找到</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .star {
            position: fixed;
            width: 2px; height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--d,3s) ease-in-out infinite;
            opacity: 0;
        }
        @keyframes twinkle {
            0%,100%{opacity:0;transform:scale(.5)}
            50%{opacity:.8;transform:scale(1)}
        }
        .moon {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%,100%{transform:translateY(0) rotate(-5deg)}
            50%{transform:translateY(-20px) rotate(5deg)}
        }
        @keyframes fadeUp {
            from{opacity:0;transform:translateY(30px)}
            to{opacity:1;transform:translateY(0)}
        }
        .fade-up { animation: fadeUp .7s ease forwards; }
        .fade-up-2 { animation: fadeUp .7s .15s ease forwards; opacity:0; }
        .fade-up-3 { animation: fadeUp .7s .3s ease forwards; opacity:0; }
        .fade-up-4 { animation: fadeUp .7s .45s ease forwards; opacity:0; }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            transition: all .3s;
        }
        .btn-primary:hover { opacity: .88; transform: translateY(-2px); box-shadow: 0 12px 30px rgba(99,102,241,.35); }

        .btn-ghost {
            border: 1px solid rgba(99,102,241,.4);
            color: #818cf8;
            transition: all .3s;
        }
        .btn-ghost:hover { background: rgba(99,102,241,.1); transform: translateY(-2px); }

        .glitch {
            position: relative;
        }
        .glitch::before, .glitch::after {
            content: '404';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        .glitch::before {
            color: #ec4899;
            animation: glitch1 3s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }
        .glitch::after {
            color: #6366f1;
            animation: glitch2 3s infinite;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }
        @keyframes glitch1 {
            0%,90%,100%{transform:translate(0)}
            92%{transform:translate(-3px,1px)}
            94%{transform:translate(3px,-1px)}
            96%{transform:translate(-2px,2px)}
        }
        @keyframes glitch2 {
            0%,90%,100%{transform:translate(0)}
            92%{transform:translate(3px,-1px)}
            94%{transform:translate(-3px,1px)}
            96%{transform:translate(2px,-2px)}
        }

        .orbit {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(99,102,241,.2);
            animation: orbit linear infinite;
        }
        @keyframes orbit {
            from{transform:rotate(0deg)}
            to{transform:rotate(360deg)}
        }
        .orbit-dot {
            position: absolute;
            width: 8px; height: 8px;
            border-radius: 50%;
            top: -4px; left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
<div id="stars"></div>

<div class="relative z-10 text-center px-6 max-w-lg mx-auto">
    <!-- 轨道装饰 -->
    <div class="relative inline-block mb-8">
        <div class="orbit" style="width:180px;height:180px;top:-20px;left:-20px;animation-duration:8s">
            <div class="orbit-dot bg-indigo-400"></div>
        </div>
        <div class="orbit" style="width:240px;height:240px;top:-50px;left:-50px;animation-duration:12s;animation-direction:reverse">
            <div class="orbit-dot bg-purple-400"></div>
        </div>

        <!-- 月亮 -->
        <div class="moon text-8xl relative z-10">🌙</div>
    </div>

    <!-- 404 数字 -->
    <div class="glitch text-9xl font-black mb-4 fade-up" style="
        background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
    ">404</div>

    <h1 class="text-2xl font-bold mb-3 fade-up-2">这个梦境不存在</h1>
    <p class="text-slate-400 mb-8 leading-relaxed fade-up-3">
        你迷失在梦境的迷宫里了。<br>
        这个页面可能已经消散在梦境的薄雾中……
    </p>

    <div class="flex flex-col sm:flex-row gap-4 justify-center fade-up-4">
        <button onclick="history.back()" class="btn-ghost px-8 py-3 rounded-xl font-semibold">
            ← 返回上一页
        </button>
        <button onclick="window.location.href='index.html'" class="btn-primary px-8 py-3 rounded-xl font-semibold text-white">
            🌙 回到首页
        </button>
    </div>

    <!-- 快捷链接 -->
    <div class="mt-12 fade-up-4">
        <p class="text-xs text-slate-500 mb-4">或者去这些地方：</p>
        <div class="flex justify-center gap-6 text-sm">
            <a href="app.html" class="text-indigo-400 hover:text-indigo-300 transition">📊 仪表板</a>
            <a href="app.html?tab=journal" class="text-purple-400 hover:text-purple-300 transition">📝 记录梦境</a>
            <a href="analysis.html" class="text-pink-400 hover:text-pink-300 transition">🤖 AI 分析</a>
        </div>
    </div>
</div>

<script>
(function(){
    const c = document.getElementById('stars');
    for(let i=0;i<100;i++){
        const s=document.createElement('div');
        s.className='star';
        s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*3}s`;
        c.appendChild(s);
    }
})();
</script>
</body>
</html>
